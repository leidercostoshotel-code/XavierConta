<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contabilidad - Business Edition V23</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <style>
        :root { --bg:#eef2f8; --card:#fff; --navy:#102a43; --navy-2:#1f4f82; --gold:#fbbf24; --text:#1f2937; --line:#d9e1ee; --ok:#0f9d58; }
        * { box-sizing: border-box; }
        body { margin:0; font-family:'Inter','Segoe UI',system-ui,sans-serif; background: radial-gradient(circle at 15% 15%, #f8fbff 0%, #edf3fb 40%, #e8eef7 100%); color:var(--text); padding:28px; }
        .container { width:min(1700px,100%); margin:0 auto; background:linear-gradient(165deg,rgba(255,255,255,.98),rgba(248,251,255,.95)); border-radius:22px; box-shadow:0 28px 60px rgba(16,42,67,.12); padding:30px; border:1px solid #e5edf8; }
        .drop-zone { border:2px dashed #78a2d3; background:linear-gradient(180deg,#f8fbff,#eff6ff); border-radius:14px; padding:30px; text-align:center; cursor:pointer; color:#2b4f74; margin-bottom:20px; font-weight:600; font-size:28px; display:flex; align-items:center; justify-content:center; gap:12px; }
        .btn-group { display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
        button { border:none; border-radius:12px; padding:13px 22px; font-weight:700; cursor:pointer; font-size:16px; display:inline-flex; align-items:center; gap:10px; }
        .btn-excel { background:linear-gradient(90deg,#0d8f4a,var(--ok)); color:#fff; }
        .btn-clear { background:#e5e7eb; color:#1f2937; }
        .table-wrapper { overflow-x:auto; border:1px solid var(--line); border-radius:12px; max-height:640px; background:#fff; }
        table { width:max-content; min-width:100%; border-collapse:collapse; font-size:13px; }
        th { position:sticky; top:0; z-index:20; background:linear-gradient(180deg,#1f4973,var(--navy)); color:#fff; padding:10px; text-align:left; border-right:1px solid rgba(255,255,255,.12); white-space:nowrap; }
        .filter-row th { top:41px; background:#e9f0fa; padding:6px; z-index:19; }
        .filter-input { width:100%; border:1px solid #bfd0e6; border-radius:8px; padding:6px 8px; font-size:12px; color:#1f2937; background:#fff; }
        .filter-input:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 2px rgba(59,130,246,.15); }
        td { border-bottom:1px solid #edf2f9; border-right:1px solid #f0f4f9; padding:9px; white-space:nowrap; }
    </style>
</head>
<body>
<div class="container">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-cloud-arrow-up"></i><span>Haga clic o arrastre aquí los reportes HTML o XML de Oracle</span><input type="file" id="file-input" multiple accept=".html,.xml,.xlm" style="display: none;"></div>
    <div class="btn-group"><button class="btn-excel" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> Descargar Excel con formato</button><button class="btn-clear" onclick="clearAll()"><i class="fa-solid fa-trash"></i> Limpiar tabla</button></div>
    <div class="table-wrapper"><table id="main-table"><thead id="table-head"></thead><tbody id="table-body"></tbody></table></div>
</div>
<script>
let consolidatedData = {};
let dynamicColumns = [];
const fileInput = document.getElementById('file-input');
const tableHead = document.getElementById('table-head');
const tableBody = document.getElementById('table-body');

fileInput.onchange = (e) => handleFiles(e.target.files);

function ensureColumn(col) {
    if (!dynamicColumns.includes(col)) dynamicColumns.push(col);
}

function initBaseColumns() {
    dynamicColumns = ['FECHA', 'DOC', 'SERIE', 'NRO', 'TIPO DOC.', 'PASAPORTE', 'CLIENTE', 'FISCAL BILL NO', 'TERMINAL'];
}
initBaseColumns();

function getOrCreateDoc(docKey) {
    if (!consolidatedData[docKey]) consolidatedData[docKey] = {};
    return consolidatedData[docKey];
}

function setValue(obj, key, value) {
    if (value === undefined || value === null) return;
    obj[key] = String(value).trim();
    ensureColumn(key);
}

function flattenXmlNode(node, target, prefix = '') {
    const elementChildren = Array.from(node.childNodes).filter((n) => n.nodeType === 1);
    const currentName = (node.localName || node.tagName || '').toUpperCase();
    const basePath = prefix ? `${prefix}_${currentName}` : currentName;

    if (elementChildren.length === 0) {
        setValue(target, basePath, node.textContent || '');
        return;
    }

    const counts = {};
    elementChildren.forEach((child) => {
        const childName = (child.localName || child.tagName || '').toUpperCase();
        counts[childName] = (counts[childName] || 0) + 1;
    });

    const seen = {};
    elementChildren.forEach((child) => {
        const childName = (child.localName || child.tagName || '').toUpperCase();
        seen[childName] = (seen[childName] || 0) + 1;
        const suffix = counts[childName] > 1 ? `_${seen[childName]}` : '';
        flattenXmlNode(child, target, `${basePath}${suffix}`);
    });
}

function handleFiles(files) {
    if (files.length === 0) return;
    Array.from(files).forEach((file) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const content = event.target.result;
            const ext = (file.name.split('.').pop() || '').toLowerCase();
            if (ext === 'xml' || ext === 'xlm') processXML(content);
            else processHTML(content);
            renderTable();
        };
        reader.readAsText(file);
    });
}

function processHTML(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const rows = doc.querySelectorAll('tr');
    rows.forEach((row) => {
        const cells = Array.from(row.querySelectorAll('td')).map((c) => {
            const raw = (c.textContent || '').replace(/ /g, ' ');
            return raw.replace(/\s+/g, ' ').trim();
        });
        if (cells.length < 6 || !/^\d{2}[-/]\d{2}[-/](?:\d{2}|\d{4})$/.test(cells[0])) return;
        const docRaw = cells[2];
        if (!docRaw || docRaw.toLowerCase().includes('total')) return;
        const docKey = docRaw.replace(/\s/g, '');
        const d = getOrCreateDoc(docKey);
        const dateParts = cells[0].replace(/\//g, '-').split('-');
        const year = dateParts[2].length === 2 ? `20${dateParts[2]}` : dateParts[2];
        setValue(d, 'FECHA', `${dateParts[0]}/${dateParts[1]}/${year}`);
        const bp = docKey.split('-');
        setValue(d, 'TIPO DOC.', bp[0] || '');
        setValue(d, 'SERIE', bp[1] || '');
        setValue(d, 'NRO', bp[2] || '');
        setValue(d, 'DOC', docKey.includes('-B') ? 'BOL' : (docKey.includes('-F') ? 'FAC' : 'NCR'));
        setValue(d, 'TERMINAL', cells[3] || '');
        setValue(d, 'CLIENTE', cells[4] || '');
        setValue(d, 'PASAPORTE', cells[5] || '');
        setValue(d, 'FISCAL BILL NO', docKey);
    });
}

function processXML(xmlText) {
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, 'application/xml');
    const parserError = xml.querySelector('parsererror');
    if (parserError) {
        console.error('No se pudo leer el XML:', parserError.textContent || '');
        return;
    }

    const byLocalName = (root, localName) =>
        Array.from(root.getElementsByTagName('*')).filter((node) => {
            const tag = (node.localName || node.tagName || '').toUpperCase();
            return tag === localName.toUpperCase();
        });

    const firstText = (root, localName) => {
        const node = byLocalName(root, localName)[0];
        return (node?.textContent || '').trim();
    };

    const bills = byLocalName(xml, 'G_BILL_NO');
    if (bills.length === 0) {
        console.warn('XML leído, pero no se encontraron nodos G_BILL_NO.');
        return;
    }

    bills.forEach((bill) => {
        const fiscalBillNo = firstText(bill, 'FISCAL_BILL_NO');
        const status = firstText(bill, 'STATUS').toUpperCase();
        const isVoid = firstText(bill, 'IS_VOID').toUpperCase();
        if (!fiscalBillNo || status === 'VOID' || isVoid === 'Y') return;

        const d = getOrCreateDoc(fiscalBillNo.replace(/\s/g, ''));

        Array.from(bill.childNodes)
            .filter((n) => n.nodeType === 1)
            .forEach((child) => flattenXmlNode(child, d));

        const parts = fiscalBillNo.split('-');
        setValue(d, 'DOC', (parts[1] || '').startsWith('B') ? 'BOL' : ((parts[1] || '').startsWith('F') ? 'FAC' : 'NCR'));
        setValue(d, 'SERIE', parts[1] || '');
        setValue(d, 'NRO', parts[2] || '');
        setValue(d, 'TIPO DOC.', parts[0] || '');
        setValue(d, 'FISCAL BILL NO', fiscalBillNo);
        setValue(d, 'CLIENTE', d.DISPLAY_NAME || '');
        setValue(d, 'PASAPORTE', d.TAX1_NO || '');
        setValue(d, 'TERMINAL', d.FISCAL_TERMINAL || '');
        if (d.CHAR_BILL_GENERATION_DATE) {
            const dt = d.CHAR_BILL_GENERATION_DATE.split('-');
            if (dt.length === 3) setValue(d, 'FECHA', `${dt[0]}/${dt[1]}/20${dt[2]}`);
        }
    });
}

function renderTable() {
    const list = Object.values(consolidatedData);

    tableHead.innerHTML = `
        <tr>${dynamicColumns.map(c => `<th>${c}</th>`).join('')}</tr>
    `;

    tableBody.innerHTML = '';
    list.forEach((item) => {
        const tr = document.createElement('tr');
        tr.innerHTML = dynamicColumns.map(col => `<td>${item[col] ?? ''}</td>`).join('');
        tableBody.appendChild(tr);
    });
}

async function exportToExcel() {
    const data = Object.values(consolidatedData);
    if (data.length === 0) return;
    const workbook = new ExcelJS.Workbook();
    const ws = workbook.addWorksheet('Ventas');
    ws.addRow(dynamicColumns);
    data.forEach(i => ws.addRow(dynamicColumns.map(col => i[col] ?? '')));
    ws.views = [{state: 'frozen', ySplit: 1}];
    ws.autoFilter = { from: 'A1', to: `${String.fromCharCode(64 + Math.min(dynamicColumns.length, 26))}1` };
    ws.getRow(1).font = { bold: true, color: { argb: 'FFFFFFFF' } };
    ws.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1E4A77' } };
    dynamicColumns.forEach((_, idx) => ws.getColumn(idx + 1).width = 18);
    const buffer = await workbook.xlsx.writeBuffer();
    const blob = new Blob([buffer], {type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'Reporte_Ventas_XML_Completo.xlsx';
    a.click();
    URL.revokeObjectURL(a.href);
}

function clearAll() { consolidatedData = {}; initBaseColumns(); renderTable(); }

renderTable();
</script>
</body>
</html>
