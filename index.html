<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contabilidad - Business Edition V23</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <style>
        :root { --bg:#eef2f8; --card:#fff; --navy:#102a43; --navy-2:#1f4f82; --gold:#fbbf24; --text:#1f2937; --line:#d9e1ee; --ok:#0f9d58; }
        * { box-sizing: border-box; }
        body { margin:0; font-family:'Inter','Segoe UI',system-ui,sans-serif; background: radial-gradient(circle at 15% 15%, #f8fbff 0%, #edf3fb 40%, #e8eef7 100%); color:var(--text); padding:28px; }
        .container { width:min(1700px,100%); margin:0 auto; background:linear-gradient(165deg,rgba(255,255,255,.98),rgba(248,251,255,.95)); border-radius:22px; box-shadow:0 28px 60px rgba(16,42,67,.12); padding:30px; border:1px solid #e5edf8; }
        .hero { display:flex; align-items:flex-start; justify-content:space-between; gap:18px; margin-bottom:8px; }
        .title-wrap { display:flex; gap:14px; align-items:center; }
        .title-icon { width:50px; height:50px; border-radius:12px; display:grid; place-items:center; background:linear-gradient(135deg,#17385f,#295f98); color:#fff; font-size:22px; box-shadow:0 10px 20px rgba(23,56,95,.26); }
        h1 { margin:0; color:var(--navy); font-size:42px; font-weight:800; text-transform:capitalize; }
        .subtitle { margin-top:7px; color:#5f6b7c; font-size:17px; font-weight:500; }
        .badge-premium { background:linear-gradient(135deg,#111827,#2d4f7c); color:#e5edff; font-size:12px; font-weight:700; letter-spacing:.8px; padding:8px 12px; border-radius:999px; }
        .status-bar { margin:22px 0; background:linear-gradient(135deg,#143458,#1f4f82 72%,#2d6cad); color:#fff; border-radius:14px; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 14px 28px rgba(24,63,104,.24); font-size:18px; font-weight:600; }
        .drop-zone { border:2px dashed #78a2d3; background:linear-gradient(180deg,#f8fbff,#eff6ff); border-radius:14px; padding:30px; text-align:center; cursor:pointer; color:#2b4f74; margin-bottom:20px; font-weight:600; font-size:28px; display:flex; align-items:center; justify-content:center; gap:12px; }
        .btn-group { display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
        button { border:none; border-radius:12px; padding:13px 22px; font-weight:700; cursor:pointer; font-size:16px; display:inline-flex; align-items:center; gap:10px; }
        .btn-excel { background:linear-gradient(90deg,#0d8f4a,var(--ok)); color:#fff; box-shadow:0 8px 18px rgba(15,157,88,.25); }
        .btn-clear { background:#e5e7eb; color:#1f2937; }
        .table-wrapper { overflow-x:auto; border:1px solid var(--line); border-radius:12px; max-height:640px; background:#fff; }
        table { width:100%; min-width:3000px; border-collapse:collapse; font-size:13px; }
        th { position:sticky; top:0; z-index:20; background:linear-gradient(180deg,#1f4973,var(--navy)); color:#fff; padding:12px 10px; text-align:left; border-right:1px solid rgba(255,255,255,.12); }
        td { border-bottom:1px solid #edf2f9; border-right:1px solid #f0f4f9; padding:10px; white-space:nowrap; }
        tr:nth-child(even) { background:#f8fbff; } tr:hover { background:#eaf3ff; }
        .num { text-align:right; font-family:Consolas,Monaco,monospace; font-weight:700; }
        td.col-total { background:#fff9e9 !important; border-left:2px solid var(--gold); }
        th.col-total { border-left:2px solid var(--gold); }
        .tag-doc { display:inline-block; padding:3px 9px; background:#edf4ff; color:var(--navy); border:1px solid #bfd6f2; border-radius:999px; font-size:11px; font-weight:800; }
    </style>
</head>
<body>
<div class="container">
    <div class="hero"><div class="title-wrap"><div class="title-icon"><i class="fa-solid fa-building-columns"></i></div><div><h1>contabilidad</h1><div class="subtitle"><i class="fa-solid fa-hotel"></i> Swissotel Lima Peru.</div></div></div><div class="badge-premium"><i class="fa-solid fa-crown"></i> PREMIUM BUSINESS</div></div>
    <div class="status-bar"><span id="status"><i class="fa-solid fa-chart-line"></i> Listo para procesar archivos</span><span id="counter" style="font-size: 12px; opacity: 0.9;">V23.0.0</span></div>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-cloud-arrow-up"></i><span>Haga clic o arrastre aquí los reportes XML de Oracle</span><input type="file" id="file-input" multiple accept=".xml,text/xml,application/xml" style="display: none;"></div>
    <div class="btn-group"><button class="btn-excel" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> Descargar Excel con formato</button><button class="btn-clear" onclick="clearAll()"><i class="fa-solid fa-trash"></i> Limpiar tabla</button></div>
    <div class="table-wrapper"><table id="main-table"><thead><tr><th>FECHA</th><th>DOC</th><th>SERIE</th><th>NRO</th><th>TIPO DOC.</th><th>PASAPORTE</th><th>-</th><th>CLIENTE</th><th>REDONDEO</th><th>PROPINA</th><th>FISCAL BILL NO</th><th>TERMINAL</th><th>SUB+18%</th><th class="col-tax">SUB + 10%</th><th>18%</th><th>10%</th><th class="col-tax">SUB TOTAL</th><th class="col-tax">TOTAL FACTURADO</th><th class="col-tax">PEND</th></tr></thead><tbody id="table-body"></tbody></table></div>
</div>
<script>
let tableRows = [];
let tableHeaders = [];
const fileInput = document.getElementById('file-input');
const tableBody = document.getElementById('table-body');
const statusMsg = document.getElementById('status');
const mainTable = document.getElementById('main-table');
const tableHeadRow = mainTable.querySelector('thead tr');
const DERIVED_RCONS_HEADER = 'R. CONS. 10%';
const headerAliases = {
  'LIST_G_TAX_GROUP.G_TAX_GROUP_1.LIST_G_GROSS_AMT.G_GROSS_AMT.NET_AMT': 'OP.GRAVADA',
  'LIST_G_TAX_GROUP.G_TAX_GROUP_1.LIST_G_GROSS_AMT.G_GROSS_AMT.TAX_AMT': 'I.G.V.',
  'LIST_G_TAX_GROUP.G_TAX_GROUP_3.LIST_G_GROSS_AMT.G_GROSS_AMT.GROSS_AMT': 'PROPINA',
  'TOTAL_GROSS': 'IMPORTE TOTAL'
};

function getHeaderLabel(header) {
  return headerAliases[header] || header;
}



function resolveHeaderKeyByAlias(alias) {
  return tableHeaders.find(h => getHeaderLabel(h) === alias) || null;
}

function toNumber(value) {
  const num = Number(value);
  return Number.isFinite(num) ? num : 0;
}

function applyDerivedColumns() {
  const totalNonRevKey = tableHeaders.find(h => h === 'TOTAL_NONREV') || resolveHeaderKeyByAlias('TOTAL_NONREV');
  const propinaKey = resolveHeaderKeyByAlias('PROPINA') || tableHeaders.find(h => h === 'PROPINA');
  if (!totalNonRevKey || !propinaKey) return;

  tableRows.forEach(row => {
    row[DERIVED_RCONS_HEADER] = (toNumber(row[totalNonRevKey]) - toNumber(row[propinaKey])).toFixed(2);
  });

  if (!tableHeaders.includes(DERIVED_RCONS_HEADER)) {
    const totalNonRevIndex = tableHeaders.indexOf(totalNonRevKey);
    tableHeaders.splice(totalNonRevIndex + 1, 0, DERIVED_RCONS_HEADER);
  }
}

fileInput.onchange = (e) => handleFiles(e.target.files);

function handleFiles(files) {
  if (files.length === 0) return;
  statusMsg.innerText = `Importando ${files.length} archivo(s) XML...`;
  clearAll(false);
  let processed = 0;
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (event) => {
      processXML(event.target.result);
      processed += 1;
      if (processed === files.length) renderTable();
    };
    reader.readAsText(file);
  });
}

function processXML(xmlText) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, 'application/xml');
  if (xml.querySelector('parsererror')) return;
  xml.querySelectorAll('G_BILL_NO').forEach(node => {
    const row = {};
    flattenNode(node, row, '');
    tableRows.push(row);
  });
  tableHeaders = Array.from(new Set(tableRows.flatMap(r => Object.keys(r))));
  applyDerivedColumns();
}

function flattenNode(node, target, parentKey) {
  const children = Array.from(node.children);
  if (children.length === 0) {
    target[parentKey || node.tagName] = (node.textContent || '').trim().replace(/\s+/g, ' ');
    return;
  }
  const totalByTag = {};
  children.forEach(c => totalByTag[c.tagName] = (totalByTag[c.tagName] || 0) + 1);
  const seen = {};
  children.forEach(child => {
    seen[child.tagName] = (seen[child.tagName] || 0) + 1;
    const suffix = totalByTag[child.tagName] > 1 ? `_${seen[child.tagName]}` : '';
    const key = parentKey ? `${parentKey}.${child.tagName}${suffix}` : `${child.tagName}${suffix}`;
    flattenNode(child, target, key);
  });
}

function renderTable() {
  tableBody.innerHTML = '';
  tableHeadRow.innerHTML = '';
  tableHeaders.forEach(h => {
    const th = document.createElement('th');
    th.textContent = getHeaderLabel(h);
    tableHeadRow.appendChild(th);
  });
  tableRows.forEach(row => {
    const tr = document.createElement('tr');
    tableHeaders.forEach(h => {
      const td = document.createElement('td');
      const v = row[h] ?? '';
      td.textContent = v;
      if (v !== '' && !isNaN(Number(v))) td.classList.add('num');
      tr.appendChild(td);
    });
    tableBody.appendChild(tr);
  });
  statusMsg.innerText = `Filas importadas: ${tableRows.length} | Columnas detectadas: ${tableHeaders.length}`;
}

async function exportToExcel() {
  if (!tableRows.length) return;
  const workbook = new ExcelJS.Workbook();
  const ws = workbook.addWorksheet('XML');
  ws.addRow(tableHeaders.map(h => getHeaderLabel(h)));
  tableRows.forEach(r => ws.addRow(tableHeaders.map(h => r[h] ?? '')));
  ws.views = [{state: 'frozen', ySplit: 1}];
  ws.autoFilter = { from: 'A1', to: ws.getRow(1).getCell(tableHeaders.length).address };
  ws.getRow(1).eachCell(cell => { cell.font = { bold: true, color: { argb: 'FFFFFFFF' }, size: 11 }; cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1E4A77' } }; cell.alignment = { vertical: 'middle', horizontal: 'center' }; });
  tableHeaders.forEach((_, i) => ws.getColumn(i + 1).width = 22);
  const buffer = await workbook.xlsx.writeBuffer();
  const blob = new Blob([buffer], {type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Reporte_XML_Completo.xlsx';
  a.click();
  URL.revokeObjectURL(a.href);
}

function clearAll(resetInput = true) {
  tableRows = [];
  tableHeaders = [];
  tableBody.innerHTML = '';
  tableHeadRow.innerHTML = '';
  if (resetInput) fileInput.value = '';
  statusMsg.innerText = 'Listo para procesar XML';
}
</script>
</body>
</html>
