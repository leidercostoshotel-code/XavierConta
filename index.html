<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contabilidad - Business Edition V23</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <style>
        :root { --bg:#eef2f8; --card:#fff; --navy:#102a43; --navy-2:#1f4f82; --gold:#fbbf24; --text:#1f2937; --line:#d9e1ee; --ok:#0f9d58; }
        * { box-sizing: border-box; }
        body { margin:0; font-family:'Inter','Segoe UI',system-ui,sans-serif; background: radial-gradient(circle at 15% 15%, #f8fbff 0%, #edf3fb 40%, #e8eef7 100%); color:var(--text); padding:28px; }
        .container { width:min(1700px,100%); margin:0 auto; background:linear-gradient(165deg,rgba(255,255,255,.98),rgba(248,251,255,.95)); border-radius:22px; box-shadow:0 28px 60px rgba(16,42,67,.12); padding:30px; border:1px solid #e5edf8; }
        .hero { display:flex; align-items:flex-start; justify-content:space-between; gap:18px; margin-bottom:8px; }
        .title-wrap { display:flex; gap:14px; align-items:center; }
        .title-icon { width:50px; height:50px; border-radius:12px; display:grid; place-items:center; background:linear-gradient(135deg,#17385f,#295f98); color:#fff; font-size:22px; box-shadow:0 10px 20px rgba(23,56,95,.26); }
        h1 { margin:0; color:var(--navy); font-size:42px; font-weight:800; text-transform:capitalize; }
        .subtitle { margin-top:7px; color:#5f6b7c; font-size:17px; font-weight:500; }
        .badge-premium { background:linear-gradient(135deg,#111827,#2d4f7c); color:#e5edff; font-size:12px; font-weight:700; letter-spacing:.8px; padding:8px 12px; border-radius:999px; }
        .status-bar { margin:22px 0; background:linear-gradient(135deg,#143458,#1f4f82 72%,#2d6cad); color:#fff; border-radius:14px; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 14px 28px rgba(24,63,104,.24); font-size:18px; font-weight:600; }
        .drop-zone { border:2px dashed #78a2d3; background:linear-gradient(180deg,#f8fbff,#eff6ff); border-radius:14px; padding:30px; text-align:center; cursor:pointer; color:#2b4f74; margin-bottom:20px; font-weight:600; font-size:28px; display:flex; align-items:center; justify-content:center; gap:12px; }
        .btn-group { display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
        button { border:none; border-radius:12px; padding:13px 22px; font-weight:700; cursor:pointer; font-size:16px; display:inline-flex; align-items:center; gap:10px; }
        .btn-excel { background:linear-gradient(90deg,#0d8f4a,var(--ok)); color:#fff; box-shadow:0 8px 18px rgba(15,157,88,.25); }
        .btn-clear { background:#e5e7eb; color:#1f2937; }
        .table-wrapper { overflow-x:auto; border:1px solid var(--line); border-radius:12px; max-height:640px; background:#fff; }
        table { width:100%; min-width:1600px; border-collapse:collapse; font-size:13px; }
        th { position:sticky; top:0; z-index:20; background:linear-gradient(180deg,#1f4973,var(--navy)); color:#fff; padding:12px 10px; text-align:left; border-right:1px solid rgba(255,255,255,.12); }
        td { border-bottom:1px solid #edf2f9; border-right:1px solid #f0f4f9; padding:10px; white-space:nowrap; }
        tr:nth-child(even) { background:#f8fbff; } tr:hover { background:#eaf3ff; }
        .num { text-align:right; font-family:Consolas,Monaco,monospace; font-weight:700; }
        td.col-total { background:#fff9e9 !important; border-left:2px solid var(--gold); }
        th.col-total { border-left:2px solid var(--gold); }
        .tag-doc { display:inline-block; padding:3px 9px; background:#edf4ff; color:var(--navy); border:1px solid #bfd6f2; border-radius:999px; font-size:11px; font-weight:800; }
    </style>
</head>
<body>
<div class="container">
    <div class="hero"><div class="title-wrap"><div class="title-icon"><i class="fa-solid fa-building-columns"></i></div><div><h1>contabilidad</h1><div class="subtitle"><i class="fa-solid fa-hotel"></i> Swissotel Lima Peru.</div></div></div><div class="badge-premium"><i class="fa-solid fa-crown"></i> PREMIUM BUSINESS</div></div>
    <div class="status-bar"><span id="status"><i class="fa-solid fa-chart-line"></i> Listo para procesar archivos</span><span id="counter" style="font-size: 12px; opacity: 0.9;">V23.0.0</span></div>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-cloud-arrow-up"></i><span>Haga clic o arrastre aquí los reportes HTML o XML de Oracle</span><input type="file" id="file-input" multiple accept=".html,.xml,.xlm" style="display: none;"></div>
    <div class="btn-group"><button class="btn-excel" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> Descargar Excel con formato</button><button class="btn-clear" onclick="clearAll()"><i class="fa-solid fa-trash"></i> Limpiar tabla</button></div>
    <div class="table-wrapper"><table id="main-table"><thead><tr><th>FECHA</th><th>DOC</th><th>SERIE</th><th>NRO</th><th>TIPO DOC.</th><th>PASAPORTE</th><th>-</th><th>CLIENTE</th><th>REDONDEO</th><th>PROPINA</th><th>FISCAL BILL NO</th><th>TERMINAL</th><th>SUB+18%</th><th class="col-tax">SUB + 10%</th><th>18%</th><th>10%</th><th class="col-tax">SUB TOTAL</th><th class="col-tax">TOTAL FACTURADO</th><th class="col-tax">PEND</th></tr></thead><tbody id="table-body"></tbody></table></div>
</div>
<script>
let consolidatedData = {};
const fileInput = document.getElementById('file-input');
const tableBody = document.getElementById('table-body');
const statusMsg = document.getElementById('status');

fileInput.onchange = (e) => handleFiles(e.target.files);

function handleFiles(files) {
    if (files.length === 0) return;
    statusMsg.innerText = `Sincronizando ${files.length} archivos...`;

    Array.from(files).forEach((file) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const content = event.target.result;
            const ext = (file.name.split('.').pop() || '').toLowerCase();
            if (ext === 'xml' || ext === 'xlm') {
                processXML(content);
            } else {
                processHTML(content);
            }
            renderTable();
        };
        reader.readAsText(file);
    });
}

function getOrCreateDoc(docKey) {
    if (!consolidatedData[docKey]) {
        consolidatedData[docKey] = {
            Fecha: '', DOC: '', SERIE: '', Nro: '', TipoDoc: '', Pasaporte: '',
            NOMBRE: '', BillNo: docKey, Terminal: '', GrossAmt: 0,
            G10_Base: 0, G10_Tax: 0, G10_Sub: 0, G18_Base: 0, G18_Tax: 0, G18_Sub: 0, Redondeo: 0, Propina: 0, Pend: 0, SubTotal: 0, TotalFacturado: 0
        };
    }
    return consolidatedData[docKey];
}

function processHTML(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const rows = doc.querySelectorAll('tr');

    rows.forEach((row) => {
        const cells = Array.from(row.querySelectorAll('td'))
            .map(c => c.innerText.trim().replace(/ /g, ' '))
            .filter(t => t !== '');

        if (cells.length < 6 || !/^\d{2}-\d{2}-\d{2}$/.test(cells[0])) return;

        const docRaw = cells[2];
        if (!docRaw || docRaw.toLowerCase().includes('total')) return;

        const docKey = docRaw.replace(/\s/g, '');
        const d = getOrCreateDoc(docKey);

        const p = cells[0].split('-');
        d.Fecha = `${p[0]}/${p[1]}/20${p[2]}`;

        if (isNaN(parseFloat(cells[4].replace(/,/g, '')))) {
            const bp = docKey.split('-');
            d.TipoDoc = bp[0] || '';
            d.SERIE = bp[1] || '';
            d.Nro = bp[2] || '';
            d.DOC = docKey.includes('-B') ? 'BOL' : (docKey.includes('-F') ? 'FAC' : 'NCR');
            d.Terminal = cells[3] || '';
            d.NOMBRE = cells[4] || '';
            d.Pasaporte = cells[5] || '';
            d.BillNo = docKey;
        }

        const nums = cells.map(c => c.replace(/,/g, '')).filter(c => !isNaN(parseFloat(c)) && c.includes('.'));
        if (nums.length >= 4) {
            d.GrossAmt = parseFloat(nums[0]) || d.GrossAmt;
            d.G10_Base = parseFloat(nums[1]) || d.G10_Base;
            d.G10_Tax = parseFloat(nums[2]) || d.G10_Tax;
            d.G10_Sub = parseFloat(nums[3]) || d.G10_Sub;
            d.G18_Base = parseFloat(nums[4]) || d.G18_Base;
            d.G18_Tax = parseFloat(nums[5]) || d.G18_Tax;
            d.G18_Sub = parseFloat(nums[6]) || d.G18_Sub;
            d.SubTotal = d.G10_Tax + d.G18_Tax;
            d.TotalFacturado = d.G18_Sub;
            d.Pend = 0;
        }
    });
}

function processXML(xmlText) {
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, 'text/xml');
    const bills = xml.querySelectorAll('G_BILL_NO');

    bills.forEach((bill) => {
        const status = (bill.querySelector('STATUS')?.textContent || '').trim().toUpperCase();
        const isVoid = (bill.querySelector('IS_VOID')?.textContent || '').trim().toUpperCase();
        const fiscalBillNo = (bill.querySelector('FISCAL_BILL_NO')?.textContent || '').trim();
        if (!fiscalBillNo || status === 'VOID' || isVoid === 'Y') return;

        const d = getOrCreateDoc(fiscalBillNo.replace(/\s/g, ''));
        const parts = fiscalBillNo.split('-');
        const rawDate = (bill.querySelector('CHAR_BILL_GENERATION_DATE')?.textContent || '').trim();
        const dt = rawDate.split('-');

        d.Fecha = dt.length === 3 ? `${dt[0]}/${dt[1]}/20${dt[2]}` : d.Fecha;
        d.TipoDoc = parts[0] || d.TipoDoc;
        d.SERIE = parts[1] || d.SERIE;
        d.Nro = parts[2] || d.Nro;
        d.DOC = d.SERIE.startsWith('B') ? 'BOL' : (d.SERIE.startsWith('F') ? 'FAC' : 'NCR');
        d.BillNo = fiscalBillNo;
        d.Terminal = (bill.querySelector('FISCAL_TERMINAL')?.textContent || '').trim() || d.Terminal;
        d.NOMBRE = (bill.querySelector('DISPLAY_NAME')?.textContent || '').trim() || d.NOMBRE;
        d.Pasaporte = (bill.querySelector('TAX1_NO')?.textContent || '').trim() || d.Pasaporte;

        bill.querySelectorAll('G_TAX_GROUP').forEach((group) => {
            const n = (group.querySelector('N')?.textContent || '').trim();
            const gross = parseFloat(group.querySelector('GROSS_AMT')?.textContent || '0') || 0;
            const tax = parseFloat(group.querySelector('TAX_AMT')?.textContent || '0') || 0;
            const net = parseFloat(group.querySelector('NET_AMT')?.textContent || '0') || 0;

            if (n === '1') {
                d.G18_Sub = gross;
                d.G18_Tax = tax;
                d.G18_Base = net;
            }
            if (n === '6') {
                d.G10_Sub = gross;
                d.G10_Tax = tax;
                d.G10_Base = net;
            }
        });

        d.GrossAmt = (parseFloat(bill.querySelector('TOTAL_GROSS')?.textContent || '0') || 0);
        d.Redondeo = (parseFloat(bill.querySelector('TOTAL_NONREV')?.textContent || '0') || 0);
        d.Propina = (parseFloat(bill.querySelector('TOTAL_PAIDOUT')?.textContent || '0') || 0);
        d.SubTotal = (parseFloat(bill.querySelector('TOTAL_TAX')?.textContent || '0') || 0);
        d.TotalFacturado = d.GrossAmt;
        d.Pend = (parseFloat(bill.querySelector('TOTAL_NONTAXABLE')?.textContent || '0') || 0);
    });
}

function renderTable() { /* unchanged */
    tableBody.innerHTML = '';
    const list = Object.values(consolidatedData).filter(x => x.Fecha !== '' && x.DOC !== '' && x.BillNo && x.BillNo.trim() !== '');
    list.forEach(i => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${i.Fecha}</td><td><span class="tag-doc">${i.DOC}</span></td><td>${i.SERIE}</td><td>${i.Nro}</td><td>${i.TipoDoc}</td><td>${i.Pasaporte}</td><td></td><td style="font-weight:600;">${i.NOMBRE}</td><td class="num">${i.Redondeo.toFixed(2)}</td><td class="num">${i.Propina.toFixed(2)}</td><td>${i.BillNo}</td><td>${i.Terminal}</td><td class="num col-total">${i.GrossAmt.toFixed(2)}</td><td class="num col-tax">${i.G10_Sub.toFixed(2)}</td><td class="num" style="color:#1d4ed8;">${i.G18_Base.toFixed(2)}</td><td class="num" style="color:#1d4ed8;">${i.G10_Base.toFixed(2)}</td><td class="num col-tax">${i.SubTotal.toFixed(2)}</td><td class="num col-tax">${i.TotalFacturado.toFixed(2)}</td><td class="num col-tax">${i.Pend.toFixed(2)}</td>`;
        tableBody.appendChild(tr);
    });
    statusMsg.innerText = `Documentos consolidados: ${list.length}`;
}

async function exportToExcel() { const data = Object.values(consolidatedData).filter(x => x.Fecha !== '' && x.DOC !== '' && x.BillNo && x.BillNo.trim() !== ''); if (data.length === 0) { statusMsg.innerText = 'No hay datos para exportar.'; return; } const workbook = new ExcelJS.Workbook(); const ws = workbook.addWorksheet('Ventas'); const headers = ['FECHA','DOC','SERIE','NRO','TIPO DOC.','PASAPORTE','CLIENTE','SUB+18%','SUB + 10%','BASE 18%','BASE 10%','SUB TOTAL','TOTAL FACTURADO','SUBTOTAL 18%']; ws.addRow(headers); data.forEach(i => ws.addRow([i.Fecha, i.DOC, i.SERIE, i.Nro, i.TipoDoc, i.Pasaporte, i.NOMBRE, i.GrossAmt, i.G10_Sub, i.G18_Base, i.G10_Base, i.G10_Tax, i.G18_Tax, i.G18_Sub])); ws.views = [{state: 'frozen', ySplit: 1}]; ws.autoFilter = { from: 'A1', to: 'N1' }; ws.getRow(1).eachCell(cell => { cell.font = { bold: true, color: { argb: 'FFFFFFFF' }, size: 11 }; cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1E4A77' } }; cell.alignment = { vertical: 'middle', horizontal: 'center' }; }); const moneyCols = [8,9,10,11,12,13,14]; moneyCols.forEach(col => ws.getColumn(col).numFmt = '#,##0.00'); ws.getColumn(1).width = 14; ws.getColumn(2).width = 10; ws.getColumn(7).width = 28; ws.getColumn(8).width = 20; const buffer = await workbook.xlsx.writeBuffer(); const blob = new Blob([buffer], {type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Reporte_Ventas_GastroControl_Profesional.xlsx'; a.click(); URL.revokeObjectURL(a.href); statusMsg.innerText = 'Excel exportado con formato profesional.'; }

function clearAll() { consolidatedData = {}; tableBody.innerHTML = ''; statusMsg.innerText = 'Listo para procesar archivos'; }
</script>
</body>
</html>
